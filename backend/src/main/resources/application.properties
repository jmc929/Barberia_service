# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Spring Application Name
spring.application.name=barberia-service

# Database Configuration - Supabase Session Pooler
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.wacfhjygmoagyegzupuz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.barberia=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.core=DEBUG

# Jackson Date/Time Format
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
jwt.secret=${JWT_SECRET:aB1cD2eF3gH4iJ5kL6mN7oP8qR9sTuVwXyZ0aB1cD2eF3gH4iJ5kL6mN7oP8qR9sT}
jwt.expiration=86400000

# Actuator - Monitoreo y Observabilidad
# Expone endpoints de actuator bajo /actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Prometheus - Métricas Micrometer
# Configura el registry de Prometheus para colectar métricas
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${spring.profiles.active:default}

# JVM Metrics - Habilitadas por defecto, incluye memoria, GC, threads
# HTTP Metrics - Habilitadas por defecto, incluye request count, latency
# Database Metrics - Habilitadas si HikariCP está activo (está en spring-boot-starter-data-jpa)