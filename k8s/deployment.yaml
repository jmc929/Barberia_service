apiVersion: apps/v1
kind: Deployment

metadata:
  name: barberia-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: barberia-api

  template:
    metadata:
      labels:
        app: barberia-api

    spec:
      containers:
        - name: barberia-api

          image: barberia_service-barberia-api:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: barberia-secret
                  key: SPRING_DATASOURCE_URL

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: barberia-secret
                  key: SPRING_DATASOURCE_USERNAME

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: barberia-secret
                  key: SPRING_DATASOURCE_PASSWORD

            - name: SPRING_APPLICATION_NAME
              value: barberia-service

            - name: SERVER_PORT
              value: "8080"